<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0b0f14">
<title>BeepHunter — capture</title>
<style>
  :root{--bg:#0b0f14;--panel:#131a23;--line:#243140;--txt:#e6edf3;--dim:#7d8a99;
    --accent:#36d399;--warn:#fbbd23;--hot:#f87272;--cold:#3abff8;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;}
  body{padding:10px 12px 30px;max-width:560px;margin:0 auto;}
  h1{font-size:18px;letter-spacing:1px;margin:4px 0 10px;}
  h1 span{color:var(--accent);}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px;margin-bottom:10px;}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  label{font-size:12px;color:var(--dim);}
  select,input,button{background:#0c1117;color:var(--txt);border:1px solid var(--line);
    border-radius:8px;padding:9px 10px;font-size:15px;}
  button{cursor:pointer;}
  button.big{flex:1;padding:14px;font-size:16px;font-weight:700;}
  button.go{background:rgba(54,211,153,.16);border-color:var(--accent);color:var(--accent);}
  button.stop{background:rgba(248,114,114,.16);border-color:var(--hot);color:var(--hot);}
  button.active{background:rgba(54,211,153,.2);border-color:var(--accent);color:var(--accent);}
  .k{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;}

  /* frequency hero */
  #freqHero{font-size:46px;font-weight:800;line-height:1;letter-spacing:-1px;}
  #freqHero small{font-size:18px;color:var(--dim);font-weight:600;}
  #badge{font-size:13px;font-weight:700;padding:3px 10px;border-radius:7px;background:#1d2733;color:var(--dim);}
  #badge.locked{background:rgba(54,211,153,.15);color:var(--accent);}

  /* doppler needle */
  .needle-wrap{position:relative;height:64px;background:#0c1117;border:1px solid var(--line);
    border-radius:10px;margin-top:10px;overflow:hidden;}
  #needleMid{position:absolute;left:50%;top:0;bottom:0;width:2px;background:#39506a;}
  #needle{position:absolute;top:6px;bottom:6px;width:6px;border-radius:3px;background:#fff;
    left:50%;transform:translateX(-50%);transition:left .12s ease, background .12s;}
  .needle-lbl{position:absolute;top:4px;font-size:12px;color:var(--dim);}
  #dopVal{font-size:28px;font-weight:800;}

  .stat{display:flex;justify-content:space-between;align-items:baseline;margin:6px 0;}
  .stat .v{font-size:22px;font-weight:700;}
  .bar{height:14px;background:#0c1117;border:1px solid var(--line);border-radius:7px;overflow:hidden;margin-top:4px;}
  #lvlFill{height:100%;width:0;background:linear-gradient(90deg,#36d399,#fbbd23,#f87272);}

  canvas{width:100%;display:block;background:#0c1117;border-radius:8px;}
  #gps{font-size:13px;color:var(--dim);line-height:1.6;}
  .hint{font-size:12px;color:var(--dim);}
  .err{color:var(--hot);font-size:13px;}
  a{color:var(--accent);}
</style>
</head>
<body>
<h1>BEEP<span>HUNTER</span> · capture</h1>

<div class="panel">
  <div class="row">
    <label>Role</label>
    <select id="role">
      <option value="hunter">📱 Hunter (walking)</option>
      <option value="reference">🛰 Reference (stationary)</option>
    </select>
    <input id="deviceLabel" placeholder="label e.g. phone" style="flex:1;min-width:90px">
  </div>
  <div class="row" style="margin-top:8px">
    <label>Mic</label>
    <select id="mic" style="flex:1"><option>— grant mic to list —</option></select>
  </div>
  <div class="row" style="margin-top:8px">
    <button class="big go" id="startBtn">▶ Start mic</button>
  </div>
  <div id="status" class="hint" style="margin-top:6px">Tap Start and allow microphone + location.</div>
</div>

<div class="panel">
  <div class="row" style="justify-content:space-between">
    <div class="k">Locked tone</div><div id="badge">— idle —</div>
  </div>
  <div id="freqHero">––––.– <small>Hz</small></div>
  <div class="row" style="margin-top:8px">
    <button id="setRest">Set rest f₀ (stand still)</button>
    <span class="hint" id="restTxt">rest f₀ not set</span>
  </div>

  <div class="needle-wrap">
    <span class="needle-lbl" style="left:8px">◀ FLAT (away)</span>
    <span class="needle-lbl" style="right:8px">SHARP (toward) ▶</span>
    <div id="needleMid"></div>
    <div id="needle"></div>
  </div>
  <div class="row" style="justify-content:center;margin-top:6px">
    <span id="dopVal">+0.0 Hz</span>
  </div>
</div>

<div class="panel">
  <div class="stat"><span class="k">Signal level</span><span class="v"><span id="lvl">–</span> dB</span></div>
  <div class="bar"><div id="lvlFill"></div></div>
  <div class="stat"><span class="k">Cadence</span><span class="v"><span id="cad">–</span> /s</span></div>
  <div class="k" style="margin-top:8px">Beep-o-scope (band envelope)</div>
  <canvas id="scope" height="90"></canvas>
</div>

<div class="panel">
  <div class="k">Settings</div>
  <div class="row" style="margin-top:6px">
    <label>center Hz</label><input id="center" type="number" value="3050" step="10" style="width:90px">
    <label>± band</label><input id="halfband" type="number" value="120" step="10" style="width:70px">
    <button id="autoBtn" class="active">auto-track</button>
  </div>
  <div id="gps" style="margin-top:8px">GPS: waiting…</div>
</div>

<div class="panel">
  <div class="row">
    <button class="big" id="recBtn">● Start recording</button>
    <button class="big" id="dlBtn" disabled>⬇ Download</button>
  </div>
  <div id="recInfo" class="hint" style="margin-top:6px">Not recording.</div>
  <div class="hint" style="margin-top:6px">Analyze two recordings on the <a href="analyze.html">analyzer page →</a></div>
</div>

<script src="app.js"></script>
</body>
</html>
