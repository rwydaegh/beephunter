<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BeepHunter — analyze</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{--bg:#0b0f14;--panel:#131a23;--line:#243140;--txt:#e6edf3;--dim:#7d8a99;--accent:#36d399;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:"Segoe UI",system-ui,sans-serif;}
  header{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  h1{font-size:18px;margin:0;letter-spacing:1px;} h1 span{color:var(--accent);}
  .file{font-size:13px;}
  #map{height:55vh;width:100%;}
  .panel{padding:12px 16px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;}
  .k{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;}
  .v{font-size:22px;font-weight:700;}
  canvas{width:100%;height:120px;background:#0c1117;border-radius:8px;display:block;}
  a{color:var(--accent);} .hint{color:var(--dim);font-size:13px;}
  .lg{background:#fff;color:#111;padding:6px 9px;border-radius:6px;font:12px sans-serif;line-height:1.5;}
</style>
</head>
<body>
<header>
  <h1>BEEP<span>HUNTER</span> · analyze</h1>
  <label class="file">Hunter JSON (required) <input type="file" id="huntFile" accept=".json"></label>
  <label class="file">Reference JSON (optional) <input type="file" id="refFile" accept=".json"></label>
  <span class="hint" id="msg">load the hunter recording (reference optional)…</span>
  <a href="index.html">← capture</a>
</header>
<div id="map"></div>
<div class="panel">
  <div class="grid">
    <div class="card"><div class="k">Rest frequency f₀</div><div class="v"><span id="f0">–</span> Hz</div></div>
    <div class="card"><div class="k">Clock offset (auto-synced)</div><div class="v"><span id="lag">–</span> s</div></div>
    <div class="card"><div class="k">Doppler swing observed</div><div class="v"><span id="swing">–</span> Hz</div></div>
    <div class="card"><div class="k">Abeam crossings used</div><div class="v"><span id="ncross">–</span></div></div>
  </div>
  <div class="grid" style="margin-top:12px">
    <div class="card"><div class="k">Hunter speed (GPS)</div><canvas id="lvlCv"></canvas></div>
    <div class="card"><div class="k">Doppler shift vs rest f₀ (red=approaching, blue=receding)</div><canvas id="dopCv"></canvas></div>
  </div>
  <p class="hint" id="explain"></p>
</div>
<script src="analyze.js?v=4"></script>
</body>
</html>
